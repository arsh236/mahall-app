<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses - Mahall Management</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="d-flex align-items-center mb-4"><i class="fas fa-mosque fa-2x text-primary me-2"></i><h4 class="fw-bold mb-0">MAHALL</h4></div>
      <nav class="nav flex-column">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="members.html" class="nav-link"><i class="fas fa-users"></i> Members</a>
        <a href="payments.html" class="nav-link"><i class="fas fa-hand-holding-dollar"></i> Payments</a>
        <a href="expenses.html" class="nav-link active"><i class="fas fa-file-invoice-dollar"></i> Expenses</a>
        <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
        <div id="superAdminLink"></div>
      </nav>
      <hr class="my-4 opacity-10">
      <button class="btn btn-outline-danger w-100" onclick="utils.logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
    </aside>

    <main class="main-content">
      <div class="d-flex align-items-center mb-4">
        <h4 class="fw-bold mb-0">Expenses</h4>
        <button class="btn btn-danger ms-auto" data-bs-toggle="modal" data-bs-target="#expenseModal" onclick="prepareExpenseForm()">
          <i class="fas fa-plus me-1"></i> Add
        </button>
      </div>

      <!-- Mobile Bottom Nav -->
      <div class="bottom-nav d-md-none">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="members.html" class="nav-link"><i class="fas fa-users"></i> Members</a>
        <a href="payments.html" class="nav-link"><i class="fas fa-hand-holding-dollar"></i> Payments</a>
        <a href="expenses.html" class="nav-link active"><i class="fas fa-file-invoice-dollar"></i> Expenses</a>
        <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
        <div id="superAdminLinkMobile"></div>
      </div>

      <!-- Expired Warning -->
      <div id="expiryWarning" class="alert alert-warning d-none mb-4">
        <i class="fas fa-exclamation-triangle me-2"></i> Your subscription has expired. Please contact support.
      </div>

      <!-- Filters -->
      <div class="card card-glass mb-4 p-3 d-flex flex-wrap gap-3">
        <div class="input-group flex-grow-1">
          <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-search text-muted"></i></span>
          <input type="text" id="expenseSearch" class="form-control border-start-0" placeholder="Search by title..." oninput="filterExpenses()">
        </div>
        <div class="d-flex align-items-center gap-2">
          <input type="date" id="startDateFilter" class="form-control" onchange="filterExpenses()">
          <span>to</span>
          <input type="date" id="endDateFilter" class="form-control" onchange="filterExpenses()">
        </div>
      </div>
      <div class="card card-glass overflow-hidden px-0 mt-4">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="expensesTable">
            <thead class="bg-light text-muted small">
              <tr>
                <th>DATE</th>
                <th>TITLE</th>
                <th>AMOUNT</th>
                <th>NOTE</th>
                <th class="text-end">ACTIONS</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="4" class="text-center py-5">Loading expenses...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Expense Modal -->
  <div class="modal fade" id="expenseModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content card-glass p-3">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">Record Expense</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="expenseForm">
          <div class="modal-body">
            <input type="hidden" id="expenseId">
            <div class="mb-3">
              <label class="form-label">Expense Title</label>
              <input type="text" id="expTitle" class="form-control" placeholder="e.g., Electricity bill, Repair" required>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label">Amount (₹)</label>
                <input type="number" id="expAmount" class="form-control" placeholder="0.00" required>
              </div>
              <div class="col-6">
                <label class="form-label">Date</label>
                <input type="date" id="expDate" class="form-control" required>
              </div>
            </div>
            <div class="mb-0">
              <label class="form-label">Note</label>
              <input type="text" id="expNote" class="form-control" placeholder="Optional notes...">
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-danger" id="saveExpBtn">
              <span class="spinner-border spinner-border-sm d-none" id="saveExpSpinner"></span>
              Record
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const session = utils.getSession();
    if (!session) window.location.href = '../index.html';
    
    if (session.isSuperAdmin) {
      const link = `<a href="superadmin.html" class="nav-link text-warning"><i class="fas fa-user-shield"></i> SA</a>`;
      document.getElementById('superAdminLink').innerHTML = link.replace('SA', 'Super Admin');
      document.getElementById('superAdminLinkMobile').innerHTML = link;
    }
    
    if (session.isExpired) {
      document.getElementById('expiryWarning').classList.remove('d-none');
      const addBtn = document.querySelector('button[data-bs-target="#expenseModal"]');
      if (addBtn) {
        addBtn.disabled = true;
        addBtn.title = 'Renew plan to record expenses';
      }
      const saveBtn = document.getElementById('saveExpBtn');
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-lock me-2"></i>Renew Plan to Save';
      }
    }
    
    // Set default dates for filters (current month)
    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
    const formatDateForInput = (d) => {
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    };
    document.getElementById('startDateFilter').value = formatDateForInput(firstDay);
    document.getElementById('endDateFilter').value = formatDateForInput(now);

    let allExpenses = [];
    async function loadExpenses() {
      try {
        const expenses = await api.get('expenses');
        allExpenses = expenses.reverse();
        filterExpenses();
      } catch (err) {
        utils.showToast('Failed to load expenses', 'danger');
      }
    }

    function filterExpenses() {
      const q = document.getElementById('expenseSearch').value.toLowerCase();
      const start = document.getElementById('startDateFilter').value;
      const end = document.getElementById('endDateFilter').value;
      
      const filtered = allExpenses.filter(e => {
        const matchesQ = e.title.toLowerCase().includes(q);
        
        // Date Check (Normalize to yyyy-mm-dd for string comparison)
        const normalize = (val) => {
          if (!val) return '';
          const d = new Date(val);
          if (isNaN(d.getTime())) {
            // Handle dd-mm-yyyy fallback if new Date() fails
            if (typeof val === 'string' && /^\d{2}-\d{2}-\d{4}/.test(val)) {
              const pts = val.split('-');
              return `${pts[2]}-${pts[1].padStart(2, '0')}-${pts[0].padStart(2, '0')}`;
            }
            return '';
          }
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          return `${yyyy}-${mm}-${dd}`;
        };
        const eDate = normalize(e.date);
        const matchesDate = (!start || eDate >= start) && (!end || eDate <= end);
        return matchesQ && matchesDate;
      });
      
      renderExpenses(filtered);
    }

    function renderExpenses(expenses) {
      const tbody = document.querySelector('#expensesTable tbody');
      if (expenses.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5">No expenses recorded.</td></tr>';
        return;
      }
      
      const isBlocked = session.isExpired && !session.isSuperAdmin;
      tbody.innerHTML = expenses.map(e => `
        <tr>
          <td>${utils.formatDate(e.date)}</td>
          <td class="fw-bold">${e.title}</td>
          <td class="text-danger fw-bold">${utils.formatCurrency(e.amount)}</td>
          <td class="small text-muted">${e.note || '-'}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary me-2" ${isBlocked ? 'disabled title="Plan Expired"' : ''} onclick="openEditExpense('${e.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" ${isBlocked ? 'disabled title="Plan Expired"' : ''} onclick="deleteExpense('${e.id}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    function prepareExpenseForm() {
      document.getElementById('expenseForm').reset();
      document.getElementById('expenseId').value = '';
      document.getElementById('expDate').valueAsDate = new Date();
    }

    function openEditExpense(id) {
      const e = allExpenses.find(exp => exp.id === id);
      document.getElementById('expenseId').value = e.id;
      document.getElementById('expTitle').value = e.title;
      document.getElementById('expAmount').value = e.amount;
      document.getElementById('expDate').value = e.date.split('T')[0];
      document.getElementById('expNote').value = e.note || '';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('expenseModal')).show();
    }

    async function deleteExpense(id) {
      if (!confirm('Are you sure you want to delete this expense record?')) return;
      try {
        await api.post('deleteExpense', { id });
        utils.showToast('Expense record deleted');
        loadExpenses();
      } catch (err) {
        utils.showToast('Delete failed', 'danger');
      }
    }

    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('expenseId').value;
      const data = {
        id: id || undefined,
        org_id: localStorage.getItem('org_id'),
        title: document.getElementById('expTitle').value,
        amount: Number(document.getElementById('expAmount').value),
        date: document.getElementById('expDate').value,
        note: document.getElementById('expNote').value
      };

      document.getElementById('saveExpSpinner').classList.remove('d-none');
      document.getElementById('saveExpBtn').disabled = true;

      try {
        const action = id ? 'editExpense' : 'addExpense';
        const res = await api.post(action, data);
        if (res.success) {
          utils.showToast(`Expense record ${id ? 'updated' : 'recorded'} successfully!`);
          bootstrap.Modal.getInstance(document.getElementById('expenseModal')).hide();
          loadExpenses();
        }
      } catch (err) {
        utils.showToast('Failed to save expense', 'danger');
      } finally {
        document.getElementById('saveExpSpinner').classList.add('d-none');
        document.getElementById('saveExpBtn').disabled = false;
      }
    });

    loadExpenses();
  </script>
</body>
</html>
