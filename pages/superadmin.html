<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin - Mahall Management</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="d-flex align-items-center mb-4"><i class="fas fa-shield-alt fa-2x text-primary me-2"></i><h4 class="fw-bold mb-0">SUPER</h4></div>
      <nav class="nav flex-column">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to App</a>
        <a href="superadmin.html" class="nav-link active"><i class="fas fa-users-cog"></i> Organizations</a>
      </nav>
      <hr class="my-4 opacity-10">
      <button class="btn btn-outline-danger w-100" onclick="utils.logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
    </aside>

    <main class="main-content">
      <h4 class="fw-bold mb-4">Master Organization Management</h4>

      <!-- Mobile Bottom Nav -->
      <div class="bottom-nav d-md-none">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back</a>
        <a href="superadmin.html" class="nav-link active"><i class="fas fa-users-cog"></i> Master</a>
        <a href="#" class="nav-link text-danger" onclick="utils.logout()"><i class="fas fa-sign-out-alt"></i> Exit</a>
      </div>

      <div class="card card-glass overflow-hidden px-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="orgsTable">
            <thead class="bg-light text-muted small">
              <tr>
                <th>MAHALL NAME</th>
                <th>ADMIN / PHONE</th>
                <th>PLAN</th>
                <th>EXPIRY</th>
                <th class="text-end">ACTIONS</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="5" class="text-center py-5">Loading organizations...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Plan Update Modal -->
  <div class="modal fade" id="planModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content card-glass p-3">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">Manage Subscription</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="planForm">
          <input type="hidden" id="editOrgId">
          <input type="hidden" id="editAdminPhone">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Plan Type</label>
              <select id="editPlanType" class="form-select">
                <option value="Trial">Trial</option>
                <option value="Standard">Standard</option>
                <option value="Premium">Premium</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Expiry Date</label>
              <input type="date" id="editPlanExpiry" class="form-control" required>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="savePlanBtn">
              <span class="spinner-border spinner-border-sm d-none" id="savePlanSpinner"></span>
              Update Plan
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const session = utils.getSession();
    if (!session || !session.isSuperAdmin) window.location.href = 'dashboard.html';

    let allOrgs = [];

    async function loadOrgs() {
      try {
        const res = await api.get('super_admin_data', { phone: session.phone });
        allOrgs = res.organizations;
        renderOrgs();
      } catch (err) {
        utils.showToast('Failed to load data', 'danger');
      }
    }

    function renderOrgs() {
      const tbody = document.querySelector('#orgsTable tbody');
      tbody.innerHTML = allOrgs.map(org => `
        <tr>
          <td><div class="fw-bold">${org.name}</div><div class="small text-muted">${org.place}</div></td>
          <td><div>${org.admin_name}</div><div class="small text-muted">${org.admin_phone}</div></td>
          <td><span class="badge bg-primary">${org.plan_type}</span></td>
          <td>${utils.formatDate(org.plan_expiry)}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary" onclick="openPlanModal('${org.id}')">Manage</button>
          </td>
        </tr>
      `).join('');
    }

    function openPlanModal(orgId) {
      const org = allOrgs.find(o => o.id === orgId);
      document.getElementById('editOrgId').value = org.id;
      document.getElementById('editAdminPhone').value = org.admin_phone;
      document.getElementById('editPlanType').value = org.plan_type;
      
      // Parse dd-mm-yyyy to yyyy-mm-dd for the date input
      const parts = org.plan_expiry.split('-');
      if (parts.length === 3) {
        const yyyymmdd = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
        document.getElementById('editPlanExpiry').value = yyyymmdd;
      } else {
        // Fallback for ISO or other formats
        const expiryDate = new Date(org.plan_expiry);
        if (!isNaN(expiryDate.getTime())) {
          document.getElementById('editPlanExpiry').value = expiryDate.toISOString().split('T')[0];
        }
      }
      
      new bootstrap.Modal(document.getElementById('planModal')).show();
    }

    document.getElementById('planForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        org_id: document.getElementById('editOrgId').value,
        admin_phone: document.getElementById('editAdminPhone').value,
        plan_type: document.getElementById('editPlanType').value,
        plan_expiry: new Date(document.getElementById('editPlanExpiry').value).toISOString()
      };

      document.getElementById('savePlanSpinner').classList.remove('d-none');
      document.getElementById('savePlanBtn').disabled = true;

      try {
        const res = await api.post('updateUserPlan', data);
        if (res.success) {
          utils.showToast('Plan updated successfully!');
          bootstrap.Modal.getInstance(document.getElementById('planModal')).hide();
          loadOrgs();
        }
      } catch (err) {
        utils.showToast('Update failed', 'danger');
      } finally {
        document.getElementById('savePlanSpinner').classList.add('d-none');
        document.getElementById('savePlanBtn').disabled = false;
      }
    });

    loadOrgs();
  </script>
</body>
</html>
