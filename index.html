<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahall Management - Login</title>
  
  <!-- CSS Links -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #4361ee, #4895ef);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card card-glass p-4 text-center">
          <div class="mb-4">
            <div class="bg-primary text-white d-inline-block rounded-circle mb-3" style="width: 60px; height: 60px; line-height: 60px; font-size: 1.5rem;">
              <i class="fas fa-mosque"></i>
            </div>
            <h3 class="fw-bold">Mahall Committy</h3>
            <p class="text-muted">Management System v1.0</p>
          </div>
          
          <form id="loginForm">
            <div class="mb-3 text-start">
              <label class="form-label">Phone Number</label>
              <input type="tel" id="loginPhone" class="form-control" placeholder="Enter phone" required>
            </div>
            <div class="mb-4 text-start">
              <label class="form-label">Password</label>
              <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
              <span class="spinner-border spinner-border-sm d-none" id="loginSpinner"></span>
              Login Now
            </button>
            <div id="loginError" class="alert alert-danger d-none"></div>

            <p class="mb-0 mt-3 text-center">New here? <a href="register.html" class="fw-bold">Register Organization</a></p>
          </form>
          
          <p class="small text-muted mb-0 mt-3">&copy; 2026 Arshad Portfolio</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // In-page script for login logic to avoid complex dependencies on splash screen
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const loginSpinner = document.getElementById('loginSpinner');
    const loginError = document.getElementById('loginError');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const phone = document.getElementById('loginPhone').value;
      const plainPassword = document.getElementById('loginPassword').value;
      
      loginBtn.disabled = true;
      loginSpinner.classList.remove('d-none');
      loginError.classList.add('d-none');
      
      try {
        // Hash password before sending (simple SHA256)
        const hashedPassword = await utils.hashPassword(plainPassword);
        
        const response = await api.post('login', { phone, password: hashedPassword });
        
        if (response.success) {
          // Store session
          utils.setSession(response.user);
          window.location.href = 'pages/dashboard.html';
        } else {
          loginError.textContent = response.error || 'Invalid credentials';
          loginError.classList.remove('d-none');
        }
      } catch (err) {
        loginError.textContent = 'Connection failed. Check API URL.';
        loginError.classList.remove('d-none');
      } finally {
        loginBtn.disabled = false;
        loginSpinner.classList.add('d-none');
      }
    });
    
    // Check if already logged in
    window.onload = () => {
      if (utils.getSession()) {
        window.location.href = 'pages/dashboard.html';
      }
    };
  </script>
</body>
</html>
