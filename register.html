<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahall Management - Register</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #4361ee, #4895ef);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card card-glass p-4">
          <div class="text-center mb-4">
            <h3 class="fw-bold">Create Organization</h3>
            <p class="text-muted">Register your Mahall Committee</p>
          </div>
          
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label">Admin Name</label>
              <input type="text" id="regName" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" id="regPhone" class="form-control" placeholder="Enter phone" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Admin Password</label>
              <input type="password" id="regPassword" class="form-control" placeholder="Create password" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Place/Location</label>
              <input type="text" id="regPlace" class="form-control" placeholder="e.g., Kozhikode, Kerala" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3" id="regBtn">
              <span class="spinner-border spinner-border-sm d-none" id="regSpinner"></span>
              Create Account
            </button>
            <div id="regError" class="alert alert-danger d-none"></div>
            <div id="regSuccess" class="alert alert-success d-none">Registration successful! Redirecting to login...</div>

            <div class="text-center mt-3">
              <p class="mb-0">Already have an account? <a href="./" class="fw-bold">Login Here</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const registerForm = document.getElementById('registerForm');
    const regBtn = document.getElementById('regBtn');
    const regSpinner = document.getElementById('regSpinner');
    const regError = document.getElementById('regError');
    const regSuccess = document.getElementById('regSuccess');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const phone = document.getElementById('regPhone').value;
      const plainPassword = document.getElementById('regPassword').value;
      const name = document.getElementById('regName').value;
      const place = document.getElementById('regPlace').value;
      
      regBtn.disabled = true;
      regSpinner.classList.remove('d-none');
      regError.classList.add('d-none');
      
      try {
        const hashedPassword = await utils.hashPassword(plainPassword);
        
        const response = await api.post('register', { name, phone, password: hashedPassword, place });
        
        if (response.success) {
          regSuccess.classList.remove('d-none');
          setTimeout(() => window.location.href = './', 2000);
        } else {
          regError.textContent = response.error || 'Registration failed';
          regError.classList.remove('d-none');
        }
      } catch (err) {
        regError.textContent = 'Connection failed. Check API URL.';
        regError.classList.remove('d-none');
      } finally {
        regBtn.disabled = false;
        regSpinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
